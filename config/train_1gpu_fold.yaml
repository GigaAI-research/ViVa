# VivaModel - 1 GPU - 1 Task (fold_clothes only)
# Adapted from train_8gpu_3task.yaml for single-GPU smoke run on DGX Spark.

common:
  num_latent_frames: 7
  video_height: 384
  video_width: 320

dataset:
  tasks:
    - task_id: "fold_clothes"
      t5_embedding_path: "data/t5_embedding/fold_clothes/fold_clothes/fold_clothes.pt"
      data_paths:
        - "data/lerobot_home/fold_clothes_smoke"
  compute_state_stats: true
  future_offset: 50
  max_samples: null

model:
  wan:
    config_path: "weights/Wan2.2-TI2V-5B"
    checkpoint_path: "weights/Wan2.2-TI2V-5B"
    vae_path: "weights/Wan2.2-TI2V-5B/Wan2.2_VAE.pth"
    precision: "bfloat16"
    num_layers: 30

training:
  batch_size: 1
  max_steps: 200          # smoke; bump up after a clean pass
  max_epochs: 1
  learning_rate: 4.0e-5
  wan_learning_rate: 4.0e-5
  weight_decay: 0.01
  gradient_accumulation_steps: 1
  loss_weight_future_state: 0.5
  loss_weight_value: 1.0
  scheduler_type: "linear"
  warmup_steps: 50
  cycle_length: 100000
  f_max: 1.0
  f_min: 0.1
  grad_clip_norm: 1.0
  use_amp: true

system:
  checkpoint_dir: "./checkpoints/fold_smoke"
  log_level: "INFO"
  log_interval: 10
  save_interval: 100
  num_workers: 2
  pin_memory: true

logging:
  report_to: "tensorboard"
  tensorboard_log_dir: "./tensorboard"
  run_name: "train-fold-smoke"

resume:
  checkpoint_path: null
  reset_step: false
